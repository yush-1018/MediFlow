name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  flutter_ci:
    name: Flutter CI (Build & Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Dummy .env File
        run: |
          echo "GEMINI_API_KEY=dummy_gemini_key" > .env
          echo "ORS_API_KEY=dummy_ors_key" >> .env
          echo "FIREBASE_PROJECT_ID=mediflow-92e6f" >> .env
          echo "FIREBASE_API_KEY=dummy_firebase_key" >> .env
          echo "FIREBASE_AUTH_DOMAIN=mediflow-92e6f.firebaseapp.com" >> .env
          echo "FIREBASE_STORAGE_BUCKET=mediflow-92e6f.firebasestorage.app" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=71200393927" >> .env
          echo "FIREBASE_APP_ID=1:71200393927:web:346d720af6b9cf11898ce2" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build Web App
        run: flutter build web --release

      - name: Build Android Debug APK
        run: flutter build apk --debug
