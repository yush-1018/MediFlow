name: Firebase Emulator Integration Tests

on:
  push:
    branches:
      - main
      - "Aarush;)"
  pull_request:
    branches:
      - main
      - "Aarush;)"
  workflow_dispatch:

jobs:
  emulator_tests:
    name: Run Emulator Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Dummy .env File
        run: |
          echo "GEMINI_API_KEY=dummy_gemini_key" > .env
          echo "ORS_API_KEY=dummy_ors_key" >> .env
          echo "FIREBASE_PROJECT_ID=mediflow-92e6f" >> .env
          echo "FIREBASE_API_KEY=dummy_firebase_key" >> .env
          echo "FIREBASE_AUTH_DOMAIN=mediflow-92e6f.firebaseapp.com" >> .env
          echo "FIREBASE_STORAGE_BUCKET=mediflow-92e6f.firebasestorage.app" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=71200393927" >> .env
          echo "FIREBASE_APP_ID=1:71200393927:web:346d720af6b9cf11898ce2" >> .env

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Cache Firebase Emulator Binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-

      - name: Run Tests in Firebase Emulator
        run: |
          # Starts Firebase Emulators, executes flutter test, and automatically shuts down emulators
          firebase emulators:exec --project mediflow-92e6f "flutter test"
