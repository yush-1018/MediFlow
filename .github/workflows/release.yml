name: Release & Deployment Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build_assets:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Production .env File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "ORS_API_KEY=${{ secrets.ORS_API_KEY }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.PROJECT_ID }}" >> .env
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.PROJECT_ID }}.firebaseapp.com" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.PROJECT_ID }}.firebasestorage.app" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Build Android Release App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Build Web Application
        run: flutter build web --release --base-href /

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy_release:
    name: Deploy Release to Firebase
    needs: build_assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm ci

      - name: Authenticate to Google Cloud / Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Production
        run: |
          firebase deploy \
            --only hosting,functions,firestore:rules,storage \
            --project ${{ secrets.PROJECT_ID }}

  create_github_release:
    name: Create GitHub Release
    needs: [build_assets, deploy_release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/

      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build_assets.outputs.tag_name }}
          name: Release ${{ needs.build_assets.outputs.tag_name }}
          generate_release_notes: true
          files: |
            artifacts/app-release.apk
            artifacts/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
