name: Build Performance & Size Audit

on:
  schedule:
    - cron: '0 4 * * 6' # Every Saturday at 04:00 UTC
  workflow_dispatch:

jobs:
  size_audit:
    name: Build Size & Speed Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Dummy .env File
        run: |
          echo "GEMINI_API_KEY=dummy_gemini_key" > .env
          echo "ORS_API_KEY=dummy_ors_key" >> .env
          echo "FIREBASE_PROJECT_ID=mediflow-92e6f" >> .env
          echo "FIREBASE_API_KEY=dummy_firebase_key" >> .env
          echo "FIREBASE_AUTH_DOMAIN=mediflow-92e6f.firebaseapp.com" >> .env
          echo "FIREBASE_STORAGE_BUCKET=mediflow-92e6f.firebasestorage.app" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=71200393927" >> .env
          echo "FIREBASE_APP_ID=1:71200393927:web:346d720af6b9cf11898ce2" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Audit Android Build Size
        id: build_apk
        run: |
          start_time=$(date +%s)
          flutter build apk --release
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          
          apk_path="build/app/outputs/flutter-apk/app-release.apk"
          apk_size_bytes=$(stat -c%s "$apk_path")
          apk_size_mb=$(echo "scale=2; $apk_size_bytes / 1048576" | bc)
          
          echo "APK_SIZE_MB=$apk_size_mb" >> $GITHUB_ENV
          echo "APK_SIZE_BYTES=$apk_size_bytes" >> $GITHUB_ENV
          echo "APK_BUILD_TIME=$duration" >> $GITHUB_ENV

      - name: Audit Web Build Size
        id: build_web
        run: |
          start_time=$(date +%s)
          flutter build web --release
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          
          # Calculate directory size of build/web in MB
          web_size_kb=$(du -s build/web | cut -f1)
          web_size_mb=$(echo "scale=2; $web_size_kb / 1024" | bc)
          web_size_bytes=$((web_size_kb * 1024))
          
          echo "WEB_SIZE_MB=$web_size_mb" >> $GITHUB_ENV
          echo "WEB_SIZE_BYTES=$web_size_bytes" >> $GITHUB_ENV
          echo "WEB_BUILD_TIME=$duration" >> $GITHUB_ENV

      - name: Generate and Check Performance Metrics
        run: |
          # Define limits
          APK_LIMIT_MB=80.0
          WEB_LIMIT_MB=10.0
          
          echo "### 📊 Performance & Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Measured Size | Size Limit | Build Time | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          
          # Check APK
          APK_STATUS="✅ Pass"
          if (( $(echo "$APK_SIZE_MB > $APK_LIMIT_MB" | bc -l) )); then
            APK_STATUS="❌ Fail (Over limit!)"
          fi
          echo "| Android APK | ${APK_SIZE_MB} MB | ${APK_LIMIT_MB} MB | ${APK_BUILD_TIME}s | $APK_STATUS |" >> $GITHUB_STEP_SUMMARY
          
          # Check Web
          WEB_STATUS="✅ Pass"
          if (( $(echo "$WEB_SIZE_MB > $WEB_LIMIT_MB" | bc -l) )); then
            WEB_STATUS="❌ Fail (Over limit!)"
          fi
          echo "| Web Bundle | ${WEB_SIZE_MB} MB | ${WEB_LIMIT_MB} MB | ${WEB_BUILD_TIME}s | $WEB_STATUS |" >> $GITHUB_STEP_SUMMARY
          
          # Enforce budget gate
          if [ "$APK_STATUS" != "✅ Pass" ] || [ "$WEB_STATUS" != "✅ Pass" ]; then
            echo "::error::Build size exceeded performance budget limits!"
            exit 1
          fi
