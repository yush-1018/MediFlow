name: Code Quality & Testing

on:
  pull_request:
    branches:
      - main

jobs:
  quality_gate:
    name: Code Quality, Formatting & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Dummy .env File
        run: |
          echo "GEMINI_API_KEY=dummy_gemini_key" > .env
          echo "ORS_API_KEY=dummy_ors_key" >> .env
          echo "FIREBASE_PROJECT_ID=mediflow-92e6f" >> .env
          echo "FIREBASE_API_KEY=dummy_firebase_key" >> .env
          echo "FIREBASE_AUTH_DOMAIN=mediflow-92e6f.firebaseapp.com" >> .env
          echo "FIREBASE_STORAGE_BUCKET=mediflow-92e6f.firebasestorage.app" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=71200393927" >> .env
          echo "FIREBASE_APP_ID=1:71200393927:web:346d720af6b9cf11898ce2" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Code Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static Analysis
        run: flutter analyze

      - name: Run Tests with Coverage
        run: flutter test --coverage

      # Optional step: if the project integrates dart_code_metrics/dart_code_linter, it can be run here
      # - name: Run Dart Code Metrics
      #   run: |
      #     flutter pub global activate dart_code_metrics
      #     flutter pub global run dart_code_metrics:metrics analyze lib --reporter=github
