name: Cloud Functions CI/CD

on:
  push:
    branches:
      - main
      - "Aarush;)"
    paths:
      - 'functions/**'
      - '.github/workflows/cloud-functions.yml'
  pull_request:
    branches:
      - main
      - "Aarush;)"
    paths:
      - 'functions/**'
      - '.github/workflows/cloud-functions.yml'

jobs:
  functions_ci:
    name: Functions Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Dependencies
        working-directory: functions
        run: npm ci

      - name: Run Linter
        working-directory: functions
        run: npm run lint

      - name: Run Tests
        working-directory: functions
        run: npm test

  functions_deploy:
    name: Deploy Functions to Production
    needs: functions_ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Aarush;)')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Dependencies
        working-directory: functions
        run: npm ci

      - name: Authenticate to Google Cloud / Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Cloud Functions
        run: |
          firebase deploy \
            --only functions \
            --project ${{ secrets.PROJECT_ID }}
