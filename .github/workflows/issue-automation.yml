name: Issue & PR Automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  pull_request_target:
    types: [opened, synchronize]
  schedule:
    - cron: '30 1 * * *' # Runs daily at 01:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  welcome:
    name: Welcome New Contributors
    if: (github.event_name == 'issues' || github.event_name == 'pull_request') && github.event.action == 'opened'
    runs-on: ubuntu-latest

    steps:
      - name: Welcome message
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to MediFlow! 🎉
            Thank you for opening your first issue here. A maintainer will review it shortly. In the meantime, please make sure you have checked our [Contributing Guidelines](CONTRIBUTING.md) and [Code of Conduct](CODE_OF_CONDUCT.md).
          pr-message: |
            Welcome to MediFlow! 🎉
            Thank you for submitting your first pull request. We appreciate your contribution! Please ensure that you have run local formatting and analysis checks, and filled out the Pull Request template. A maintainer will review your code soon.

  labeler:
    name: Apply Pull Request Labels
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  stale:
    name: Manage Stale Issues & PRs
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Mark Stale Issues & PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue is stale because it has been open 30 days with no activity. Remove stale label or comment or this will be closed in 5 days.'
          stale-pr-message: 'This pull request is stale because it has been open 30 days with no activity. Remove stale label or comment or this will be closed in 5 days.'
          close-issue-message: 'This issue was closed because it has been inactive for 5 days since being marked stale.'
          close-pr-message: 'This pull request was closed because it has been inactive for 5 days since being marked stale.'
          days-before-stale: 30
          days-before-close: 5
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
