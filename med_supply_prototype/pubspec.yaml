name: med_supply_prototype
description: "MedSupply MVP - Real-time medical inventory tracking & AI redistribution"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.0
  cloud_functions: ^5.0.1
  firebase_storage: ^12.0.1

  # State Management
  flutter_riverpod: 2.5.1
  riverpod_annotation: 2.3.5

  # Navigation
  go_router: 14.2.0

  # UI & Charts
  google_maps_flutter: 2.6.1
  fl_chart: 0.67.0
  google_fonts: 8.0.2

  # Utils
  http: 1.2.1
  intl: 0.19.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  riverpod_generator: 2.4.0
  build_runner: 2.4.9

flutter:
  uses-material-design: true
